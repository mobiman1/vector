<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="vgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .terminal-bg { fill: #0d0d14; }
      .terminal-border { fill: #1c1c1e; }
      .title-bar { fill: #1c1c1e; }
      .btn-red { fill: #f7768e; }
      .btn-yellow { fill: #e0af68; }
      .btn-green { fill: #9ece6a; }
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .prompt { fill: #0A84FF; }
      .command { fill: #c0caf5; }
      .green { fill: #30D158; }
      .dim { fill: #48484A; }
      .white { fill: #e0e0e8; }
      .cyan { fill: #5E5CE6; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="terminal-border" width="960" height="540" rx="12"/>
  <rect class="terminal-bg" x="1" y="1" width="958" height="538" rx="11"/>

  <!-- Title bar -->
  <rect class="title-bar" x="1" y="1" width="958" height="36" rx="11"/>
  <rect class="terminal-bg" x="1" y="26" width="958" height="12"/>

  <!-- Window buttons -->
  <circle class="btn-red" cx="24" cy="19" r="7"/>
  <circle class="btn-yellow" cx="48" cy="19" r="7"/>
  <circle class="btn-green" cx="72" cy="19" r="7"/>

  <!-- Title -->
  <text x="480" y="24" text-anchor="middle" class="text dim" font-size="13">Terminal</text>

  <!-- Content -->
  <g transform="translate(32, 72)">
    <!-- Prompt line -->
    <text class="text prompt" font-size="15" y="0">~</text>
    <text class="text dim" font-size="15" x="16" y="0">$</text>
    <text class="text command" font-size="15" x="36" y="0">npx vector</text>

    <!-- V mark (small, inline) — matches logo: arm ratio 22:32=0.688, horizontal arm + right-pointing arrowhead -->
    <g filter="url(#glow)" transform="translate(36, 30)">
      <polyline
        points="0,0 22,32 44,0 52,0"
        fill="none"
        stroke="url(#vgrad)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
      <!-- Arrowhead pointing right: tip (72,0), base at x=52, ±8px -->
      <polygon points="72,0 52,-8 52,8" fill="url(#vgrad)"/>
    </g>

    <!-- Title and subtitle -->
    <text class="text white" font-size="15" y="72">  <tspan font-weight="700">Vector</tspan> <tspan class="dim">v1.0.0</tspan></text>
    <text class="text dim" font-size="15" y="96">  AI-powered mobile development workflow</text>

    <!-- Divider -->
    <line x1="36" y1="116" x2="600" y2="116" stroke="#1c1c1e" stroke-width="1"/>

    <!-- Install output -->
    <text class="text" font-size="15" y="140"><tspan class="green">  ✓</tspan><tspan class="white"> Installed commands/vector</tspan></text>
    <text class="text" font-size="15" y="164"><tspan class="green">  ✓</tspan><tspan class="white"> Installed core</tspan></text>
    <text class="text" font-size="15" y="188"><tspan class="green">  ✓</tspan><tspan class="white"> Installed agents</tspan></text>
    <text class="text" font-size="15" y="212"><tspan class="green">  ✓</tspan><tspan class="white"> Installed hooks</tspan></text>

    <!-- Done message -->
    <text class="text" font-size="15" y="260"><tspan class="green">  Done!</tspan><tspan class="white"> Run </tspan><tspan style="fill: url(#vgrad)">/vector:help</tspan><tspan class="white"> to get started.</tspan></text>

    <!-- New prompt -->
    <text class="text prompt" font-size="15" y="308">~</text>
    <text class="text dim" font-size="15" x="16" y="308">$</text>
    <text class="text white" font-size="15" x="36" y="308">▌</text>
  </g>
</svg>
